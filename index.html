<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skip &#44228;&#49328;&#44592;</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <div class="language-switcher" role="radiogroup" aria-label="언어 선택" data-i18n-attr="aria-label:languageSwitcherLabel">
            <label>
                <span data-i18n="languageKorean">한국어</span>
                <input type="radio" name="language" value="ko" checked>
            </label>
            <label>
                <span data-i18n="languageEnglish">English</span>
                <input type="radio" name="language" value="en">
            </label>
        </div>

        <header class="header">
            <h1 data-i18n="title">Skip &#44228;&#49328;&#44592;</h1>
            <button type="button" class="info-icon" aria-expanded="false" data-i18n-attr="aria-label:helpButton">?</button>
        </header>

        <section class="tooltip" aria-hidden="true">
            <button type="button" class="close-btn" data-i18n-attr="aria-label:closeButton">X</button>
            <img src="sliding_skip.jpg" alt="Skip calculation reference" data-i18n-attr="alt:helpImageAlt">
            <div class="tooltip-text">
                <p data-i18n="helpEquipmentPosition"></p>
                <p data-i18n="helpDelayTime"></p>
                <p data-i18n="helpInspectStopDistance"></p>
                <p data-i18n="helpStartFormula"></p>
                <p data-i18n="helpEndFormula"></p>
            </div>
        </section>

        <form id="calculator-form" novalidate>
            <label for="equipmentPosition">
                <span data-i18n="equipmentPosition"></span>
                <input type="number" id="equipmentPosition" step="0.01" inputmode="decimal">
            </label>
            <label for="delayTime">
                <span data-i18n="delayTime"></span>
                <input type="number" id="delayTime" step="0.01" inputmode="decimal">
            </label>
            <label for="inspectStopDistance">
                <span data-i18n="inspectStopDistance"></span>
                <input type="number" id="inspectStopDistance" step="0.01" inputmode="decimal">
            </label>
            <label for="equipmentSpeed">
                <span data-i18n="equipmentSpeed"></span>
                <input type="number" id="equipmentSpeed" step="0.01" inputmode="decimal">
            </label>
            <button type="button" id="calculate-btn" data-i18n="calculateButton"></button>
        </form>

        <section class="results" aria-live="polite">
            <p id="error-message" class="error-message" hidden></p>
            <label for="startDelayTime">
                <span data-i18n="startDelayTime"></span>
                <input type="text" id="startDelayTime" readonly>
            </label>
            <label for="endDelayTime">
                <span data-i18n="endDelayTime"></span>
                <input type="text" id="endDelayTime" readonly>
            </label>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
